services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - CONFIG_PATH=/data/config.yaml
    restart: unless-stopped

  frontend:
    image: nginx:latest
    ports:
      - "25040:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
